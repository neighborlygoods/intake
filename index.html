<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Efficiency Consultation — Neighborly Goods and Services LLC</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'DM Sans', sans-serif;
  background: #fafaf9;
  color: #1c1917;
  margin: 0;
}

/* Keep your styling — trimmed for clarity */
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 40px;
}

.field {
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 14px;
  margin-bottom: 6px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #e7e5e4;
  font-size: 14px;
}

button {
  background: #1c1917;
  color: white;
  padding: 14px 28px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #2c2825;
}

.submit-area {
  margin-top: 40px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>Client Intake Form</h1>

<form action="https://formspree.io/f/xgopbwdj" method="POST">

  <!-- EMAIL SETTINGS -->
  <input type="hidden" name="_subject" value="New Intake Submission - Neighborly Goods">
  <input type="hidden" name="_redirect" value="https://yourusername.github.io/thank-you.html">

  <!-- REQUIRED EMAIL -->
  <div class="field">
    <label>Email</label>
    <input type="email" name="email" required>
  </div>

  <!-- KEEP / ADD YOUR FIELDS BELOW -->
  <div class="field">
    <label>Full Name</label>
    <input type="text" name="full_name" required>
  </div>

  <div class="field">
    <label>Household Size</label>
    <input type="number" name="household_size">
  </div>

  <div class="field">
    <label>Monthly Utility Spend</label>
    <input type="text" name="utility_spend">
  </div>

  <div class="field">
    <label>Main Goals</label>
    <textarea name="goals"></textarea>
  </div>

  <!-- SUBMIT -->
  <div class="submit-area">
    <p>You’ll hear back within 1–2 business days.</p>
    <button type="submit">
      Submit my intake form
    </button>
  </div>

</form>

</div>

</body>
</html>
